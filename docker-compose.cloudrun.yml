# ========================================
# Cloud Run Docker Compose Reference
# ========================================
# NOTE: Cloud Run deployment uses 'gcloud run deploy' directly,
# not docker-compose. This file is for documentation and local testing.
#
# For local testing of Cloud Run images, use:
#   docker build --target cloudrun -t auth-service:cloudrun ./services/auth-service
#   docker run -p 3000:3000 --env-file .env auth-service:cloudrun
#
# Environment Variables Required for Cloud Run:
# ==============================================
#
# auth-service:
#   - DATABASE_URL: postgresql://user:pass@host:5432/lifeos_auth
#   - CLOUD_SQL_INSTANCE: project:region:instance
#   - JWT_SECRET: your-jwt-secret
#   - JWT_EXPIRES_IN: 7d
#
# knowledge-service:
#   - DATABASE_URL: postgresql://user:pass@host:5432/lifeos_knowledge
#   - CLOUD_SQL_INSTANCE: project:region:instance
#   - JWT_SECRET: your-jwt-secret
#   - UPLOAD_DIR: /usr/src/app/uploads
#   - MAX_FILE_SIZE: 10485760
#
# api-gateway:
#   - AUTH_SERVICE_URL: https://auth-service-xxx.run.app
#   - KNOWLEDGE_SERVICE_URL: https://knowledge-service-xxx.run.app
#   - ALLOWED_ORIGINS: https://yourdomain.com
#
# web:
#   - (Frontend is static, no env vars needed)
#
# Cloud Run Deployment Commands:
# ==============================================
# Build with cloudrun target:
#   docker build --target cloudrun -t gcr.io/PROJECT/auth-service:TAG ./services/auth-service
#   docker push gcr.io/PROJECT/auth-service:TAG
#
# Deploy to Cloud Run:
#   gcloud run deploy auth-service \
#     --image gcr.io/PROJECT/auth-service:TAG \
#     --platform managed \
#     --region asia-southeast1 \
#     --allow-unauthenticated \
#     --set-env-vars "DATABASE_URL=...,JWT_SECRET=...,CLOUD_SQL_INSTANCE=..."
#
# See: .github/workflows/release.yml and deploy-*.yml for automated CI/CD
