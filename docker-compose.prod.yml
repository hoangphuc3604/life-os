# ========================================
# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
# ========================================

services:
  postgres:
    # Uses postgres from base docker-compose.yml
    # Add production-specific overrides here if needed

  auth-service:
    build:
      context: ./services/auth-service
      target: production
    # Override volumes - no volume mounts for production
    volumes: []
    # Override command - production mode
    command: ["node", "dist/main"]

  knowledge-service:
    build:
      context: ./services/knowledge-service
      target: production
    # Override volumes - no volume mounts for production
    volumes: []
    # Override command - production mode
    command: ["node", "dist/main"]

  api-gateway:
    build:
      context: ./services/api-gateway
      target: production
    # Production port mapping
    ports:
      - "${API_GATEWAY_PORT:-8080}:80"

  # Frontend Web Service
  web:
    build:
      context: ./web
      target: production
      args:
        - VITE_API_GATEWAY_URL=${VITE_API_GATEWAY_URL:-http://localhost:8080}
    container_name: lifeos_web
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      - api-gateway
    networks:
      - lifeos-network

networks:
  lifeos-network:
    external: true
