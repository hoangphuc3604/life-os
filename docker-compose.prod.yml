services:
  postgres:
    image: postgres:15-alpine
    container_name: lifeos_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - lifeos-network

  auth-service:
    build:
      context: ./services/auth-service
      target: production
    container_name: lifeos_auth_service
    env_file:
      - ./services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    restart: unless-stopped
    networks:
      - lifeos-network

  knowledge-service:
    build:
      context: ./services/knowledge-service
      target: production
    container_name: lifeos_knowledge_service
    env_file:
      - ./services/knowledge-service/.env
    volumes:
      - knowledge_uploads:/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    restart: unless-stopped
    networks:
      - lifeos-network

  api-gateway:
    build:
      context: ./services/api-gateway
      target: production
    container_name: lifeos_api_gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:80"
    depends_on:
      auth-service:
        condition: service_started
      knowledge-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - lifeos-network

  web:
    build:
      context: ./web
      target: production
      args:
        - VITE_API_GATEWAY_URL=${VITE_API_GATEWAY_URL:-http://api-gateway:80/api}
    container_name: lifeos_web
    ports:
      - "${WEB_PORT:-3001}:80"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - lifeos-network

networks:
  lifeos-network:
    driver: bridge

volumes:
  postgres_data:
  knowledge_uploads:
