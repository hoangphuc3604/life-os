name: Release Pipeline - Cloud Run

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lifeos-registry

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          target: cloudrun
          push: true
          tags: |
            ${{ env.REGISTRY }}/auth-service:${{ github.ref_name }}
            ${{ env.REGISTRY }}/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Knowledge Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/knowledge-service
          file: ./services/knowledge-service/Dockerfile
          target: cloudrun
          push: true
          tags: |
            ${{ env.REGISTRY }}/knowledge-service:${{ github.ref_name }}
            ${{ env.REGISTRY }}/knowledge-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          target: cloudrun
          push: true
          tags: |
            ${{ env.REGISTRY }}/api-gateway:${{ github.ref_name }}
            ${{ env.REGISTRY }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Web
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          target: cloudrun
          push: true
          tags: |
            ${{ env.REGISTRY }}/web:${{ github.ref_name }}
            ${{ env.REGISTRY }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release PR for Staging Deployment
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Release ${{ github.ref_name }} built and pushed to Artifact Registry"
          echo "Images available at: ${{ env.REGISTRY }}"
          echo ""
          echo "Next steps:"
          echo "1. Run deploy-staging.yml workflow to deploy to staging"
          echo "2. Run deploy-production.yml workflow to deploy to production"
