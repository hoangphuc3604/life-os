name: Deploy to Production - Cloud Run

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g., v1.0.0)'
        required: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lifeos-registry

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Deploy Auth Service
      - name: Deploy Auth Service to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: auth-service
          image: ${{ env.REGISTRY }}/auth-service:${{ github.event.inputs.tag }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: false
          set-env-vars: |
            NODE_ENV=cloudrun,
            DATABASE_URL=${{ secrets.AUTH_DATABASE_URL_PRODUCTION }},
            JWT_SECRET=${{ secrets.JWT_SECRET }},
            CLOUD_SQL_INSTANCE=${{ secrets.AUTH_CLOUD_SQL_INSTANCE_PRODUCTION }}

      # Deploy Knowledge Service
      - name: Deploy Knowledge Service to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: knowledge-service
          image: ${{ env.REGISTRY }}/knowledge-service:${{ github.event.inputs.tag }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: false
          set-env-vars: |
            NODE_ENV=cloudrun,
            DATABASE_URL=${{ secrets.KNOWLEDGE_DATABASE_URL_PRODUCTION }},
            JWT_SECRET=${{ secrets.JWT_SECRET }},
            CLOUD_SQL_INSTANCE=${{ secrets.KNOWLEDGE_CLOUD_SQL_INSTANCE_PRODUCTION }},
            UPLOAD_DIR=/usr/src/app/uploads,
            MAX_FILE_SIZE=10485760

      # Deploy API Gateway
      - name: Deploy API Gateway to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: api-gateway
          image: ${{ env.REGISTRY }}/api-gateway:${{ github.event.inputs.tag }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: true
          set-env-vars: |
            AUTH_SERVICE_URL=https://auth-service.${{ secrets.PRODUCTION_DOMAIN }},
            KNOWLEDGE_SERVICE_URL=https://knowledge-service.${{ secrets.PRODUCTION_DOMAIN }},
            ALLOWED_ORIGINS=https://${{ secrets.PRODUCTION_DOMAIN }}

      # Deploy Frontend Web
      - name: Deploy Frontend Web to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: web
          image: ${{ env.REGISTRY }}/web:${{ github.event.inputs.tag }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: true
          args: nginx -g daemon off;
          memory: 256Mi
          cpu: 1

      - name: Verify Production Deployment
        run: |
          echo "Production deployment complete!"
          echo "Auth Service: https://auth-service.${{ secrets.PRODUCTION_DOMAIN }}"
          echo "Knowledge Service: https://knowledge-service.${{ secrets.PRODUCTION_DOMAIN }}"
          echo "API Gateway: https://api-gateway.${{ secrets.PRODUCTION_DOMAIN }}"
          echo "Web: https://${{ secrets.PRODUCTION_DOMAIN }}"
