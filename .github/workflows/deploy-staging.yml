name: Deploy to Staging - Cloud Run

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g., v1.0.0 or latest)'
        required: true
        default: 'latest'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lifeos-registry

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Deploy Auth Service
      - name: Deploy Auth Service to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: auth-service-staging
          image: ${{ env.REGISTRY }}/auth-service:${{ github.events.inputs.tag || 'latest' }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: false
          set-env-vars: |
            NODE_ENV=cloudrun,
            DATABASE_URL=${{ secrets.AUTH_DATABASE_URL_STAGING }},
            JWT_SECRET=${{ secrets.JWT_SECRET }},
            CLOUD_SQL_INSTANCE=${{ secrets.AUTH_CLOUD_SQL_INSTANCE_STAGING }}

      # Deploy Knowledge Service
      - name: Deploy Knowledge Service to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: knowledge-service-staging
          image: ${{ env.REGISTRY }}/knowledge-service:${{ github.events.inputs.tag || 'latest' }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: false
          set-env-vars: |
            NODE_ENV=cloudrun,
            DATABASE_URL=${{ secrets.KNOWLEDGE_DATABASE_URL_STAGING }},
            JWT_SECRET=${{ secrets.JWT_SECRET }},
            CLOUD_SQL_INSTANCE=${{ secrets.KNOWLEDGE_CLOUD_SQL_INSTANCE_STAGING }},
            UPLOAD_DIR=/usr/src/app/uploads,
            MAX_FILE_SIZE=10485760

      # Deploy API Gateway
      - name: Deploy API Gateway to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: api-gateway-staging
          image: ${{ env.REGISTRY }}/api-gateway:${{ github.events.inputs.tag || 'latest' }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: true
          set-env-vars: |
            AUTH_SERVICE_URL=https://auth-service-staging-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app,
            KNOWLEDGE_SERVICE_URL=https://knowledge-service-staging-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app,
            ALLOWED_ORIGINS=https://staging.${{ secrets.DOMAIN_NAME }}

      # Deploy Frontend Web
      - name: Deploy Frontend Web to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: web-staging
          image: ${{ env.REGISTRY }}/web:${{ github.events.inputs.tag || 'latest' }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: true
          args: nginx -g daemon off;
          memory: 256Mi
          cpu: 1

      - name: Verify Staging Deployment
        run: |
          echo "Staging deployment complete!"
          echo "Auth Service: https://auth-service-staging.${{ env.REGION }}.run.app"
          echo "Knowledge Service: https://knowledge-service-staging.${{ env.REGION }}.run.app"
          echo "API Gateway: https://api-gateway-staging.${{ env.REGION }}.run.app"
          echo "Web: https://web-staging.${{ env.REGION }}.run.app"
