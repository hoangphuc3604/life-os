name: CI/CD Pipeline - Cloud Run

on:
  push:
    branches:
      - main
      - ci/cd-test

  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lifeos-registry
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/**/package-lock.json

      - name: Install and test Auth Service
        working-directory: ./services/auth-service
        run: |
          npm ci
          npx prisma generate
          npm run test

      - name: Install and test Knowledge Service
        working-directory: ./services/knowledge-service
        run: |
          npm ci
          npx prisma generate
          npm run test

      - name: Install and test API Gateway
        working-directory: ./services/api-gateway
        run: |
          npm ci
          npm run test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci/cd-test'))
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/lifeos-auth:latest
            ${{ env.REGISTRY }}/lifeos-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Knowledge Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/knowledge-service
          file: ./services/knowledge-service/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/lifeos-knowledge:latest
            ${{ env.REGISTRY }}/lifeos-knowledge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/lifeos-gateway:latest
            ${{ env.REGISTRY }}/lifeos-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci/cd-test'))
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Auth Service to Cloud Run
        run: |
          gcloud run deploy auth-service \
            --image ${{ env.REGISTRY }}/lifeos-auth:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:lifeos-auth-db \
            --set-env-vars "NODE_ENV=cloudrun" \
            --set-env-vars "DATABASE_URL=${{ secrets.AUTH_DATABASE_URL }}" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 300s \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Knowledge Service to Cloud Run
        run: |
          gcloud run deploy knowledge-service \
            --image ${{ env.REGISTRY }}/lifeos-knowledge:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:lifeos-knowledge-db \
            --set-env-vars "NODE_ENV=cloudrun" \
            --set-env-vars "DATABASE_URL=${{ secrets.KNOWLEDGE_DATABASE_URL }}" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "UPLOAD_DIR=/usr/src/app/uploads" \
            --set-env-vars "MAX_FILE_SIZE=10485760" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 300s \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy API Gateway to Cloud Run
        run: |
          gcloud run deploy api-gateway \
            --image ${{ env.REGISTRY }}/lifeos-gateway:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --set-env-vars "AUTH_SERVICE_URL=https://auth-service-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app" \
            --set-env-vars "KNOWLEDGE_SERVICE_URL=https://knowledge-service-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app" \
            --set-env-vars "ALLOWED_ORIGINS=https://${{ secrets.DOMAIN_NAME }}" \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 100 \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Frontend Web to Cloud Run
        run: |
          gcloud run deploy web \
            --image ${{ env.REGISTRY }}/lifeos-web:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 1000 \
            --args "nginx,-g,daemon off;" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify Production Deployment
        run: |
          echo "Production deployment complete!"
          echo "Auth Service: https://auth-service-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app"
          echo "Knowledge Service: https://knowledge-service-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app"
          echo "API Gateway: https://api-gateway-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app"
          echo "Web: https://web-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app"
