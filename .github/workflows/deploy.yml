name: CI/CD Pipeline - Cloud Run

on:
  push:
    branches:
      - main
      - ci/cd-test

  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lifeos-registry
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/**/package-lock.json

      - name: Install and test Auth Service
        working-directory: ./services/auth-service
        run: |
          npm ci
          npx prisma generate
          npm run test

      - name: Install and test Knowledge Service
        working-directory: ./services/knowledge-service
        run: |
          npm ci
          npx prisma generate
          npm run test

      - name: Install and test API Gateway
        working-directory: ./services/api-gateway
        run: |
          npm ci
          npm run test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci/cd-test'))
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-auth:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Knowledge Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/knowledge-service
          file: ./services/knowledge-service/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-knowledge:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-knowledge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-gateway:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci/cd-test'))
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Auth Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: auth-service
          image: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-auth:${{ github.sha }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: false
          set-env-vars: |
            NODE_ENV=cloudrun,
            DATABASE_URL=${{ secrets.AUTH_DATABASE_URL }},
            JWT_SECRET=${{ secrets.JWT_SECRET }},
            PORT=3000

      - name: Deploy Knowledge Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: knowledge-service
          image: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-knowledge:${{ github.sha }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: false
          set-env-vars: |
            NODE_ENV=cloudrun,
            DATABASE_URL=${{ secrets.KNOWLEDGE_DATABASE_URL }},
            JWT_SECRET=${{ secrets.JWT_SECRET }},
            PORT=3002,
            UPLOAD_DIR=/usr/src/app/uploads,
            MAX_FILE_SIZE=10485760

      - name: Deploy API Gateway to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: api-gateway
          image: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-gateway:${{ github.sha }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: true
          set-env-vars: |
            AUTH_SERVICE_URL=https://auth-service-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app,
            KNOWLEDGE_SERVICE_URL=https://knowledge-service-${{ secrets.GCP_PROJECT_NUMBER }}.${{ env.REGION }}.run.app,
            ALLOWED_ORIGINS=https://${{ secrets.DOMAIN_NAME }}

      - name: Deploy Frontend Web to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: web
          image: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-web:${{ github.sha }}
          region: ${{ env.REGION }}
          platform: managed
          allow-unauthenticated: true
          args: nginx -g daemon off;
          memory: 256Mi
          cpu: 1

      - name: Verify Production Deployment
        run: |
          echo "Production deployment complete!"
          echo "Auth Service: https://auth-service.${{ env.REGION }}.run.app"
          echo "Knowledge Service: https://knowledge-service.${{ env.REGION }}.run.app"
          echo "API Gateway: https://api-gateway.${{ env.REGION }}.run.app"
          echo "Web: https://web.${{ env.REGION }}.run.app"
