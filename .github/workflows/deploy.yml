name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and test Auth Service
        working-directory: ./services/auth-service
        run: |
          npm install
          npx prisma generate
          npm run test

      - name: Install dependencies and test API Gateway
        working-directory: ./services/api-gateway
        run: |
          npm install
          npm run test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Auth
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          file: ./services/auth-service/Dockerfile
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-auth:latest

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lifeos-gateway:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Copy docker-compose.prod.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/lifeos"
          strip_components: 0

      - name: Executing remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            cd ~/lifeos
            echo "DATABASE_URL=postgresql://user:password@postgres:5432/lifeos_auth" > .env
            echo "POSTGRES_HOST=postgres" >> .env
            echo "POSTGRES_PORT=5432" >> .env
            echo "POSTGRES_USER=user" >> .env
            echo "POSTGRES_PASSWORD=password" >> .env
            echo "POSTGRES_DB=lifeos_auth" >> .env
            echo "JWT_SECRET=super-secret-key-change-in-production" >> .env
            echo "JWT_EXPIRATION=15m" >> .env
            echo "PORT=3000" >> .env
            echo "NODE_ENV=production" >> .env
            echo "GITHUB_REPOSITORY_OWNER=${{ env.OWNER_LC }}" >> .env
            echo "${{ secrets.GH_PACKAGE_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
