server {
    listen 80;
    server_name localhost;

    location /api/auth/ {
        proxy_pass http://auth-service:3000/auth/;
        include /etc/nginx/snippets/proxy_params.conf;
        include /etc/nginx/snippets/cors.conf;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location = /auth/validate {
        internal;
        proxy_pass http://auth-service:3000/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/knowledge/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }

        auth_request /auth/validate;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_email $upstream_http_x_user_email;

        proxy_set_header Authorization "";
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-User-Email $user_email;

        proxy_pass http://knowledge-service:3002/;
        include /etc/nginx/snippets/proxy_params.conf;
        include /etc/nginx/snippets/cors.conf;
    }

    location /api/protected/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }

        auth_request /auth/validate;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_email $upstream_http_x_user_email;

        proxy_set_header Authorization "";
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-User-Email $user_email;

        proxy_pass http://auth-service:3000/auth/public-protected;
        include /etc/nginx/snippets/proxy_params.conf;
        include /etc/nginx/snippets/cors.conf;
    }

    location / {
        return 404;
    }
}
